<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocollo31</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="terminal"></div>

    <script>
        const lines = [
            "Warning: timeline corrupted",
            "The system has detected an error with message:",
            "‘for3ign s1gnal detected, unauthorised user is int3rcepting’.",
            "Clearance required"
        ];

        const terminal = document.getElementById("terminal");
        const typingSpeed = 50; // ms per character
        const linePause = 800;  // pause after each line

        let currentLine = 0;
        let currentChar = 0;

        function typeLine() {
            if (currentLine >= lines.length) return;

            const line = lines[currentLine];
            terminal.innerHTML = lines.slice(0, currentLine).join("\n") + "\n" + line.substring(0, currentChar) + '<span class="cursor">|</span>';

            if (currentChar < line.length) {
                currentChar++;
                setTimeout(typeLine, typingSpeed);
            } else {
                currentLine++;
                currentChar = 0;
                setTimeout(typeLine, linePause);
            }
        }

        typeLine();
    </script>
</body>
</html>
