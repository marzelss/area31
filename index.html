<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area31</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="terminal"></div>
<button id="startNext"></button>

<script>
    const terminal = document.getElementById("terminal");
    const startNextBtn = document.getElementById("startNext");
    const typingSpeed = 30;
    const linePause = 800;
    const userName = sessionStorage.getItem("realName");

// Detect language
const userLang = navigator.language.startsWith("it") ? "it" : "en";

let lines = [];
let startText = "";

// Typewriter effect
function startTyping() {
    let currentLine = 0;
    let currentChar = 0;

    function typeLine() {
        if (currentLine >= lines.length) {
            // Show localized button when finished
            startNextBtn.style.display = "inline-block";
            startNextBtn.textContent = startText;
            startNextBtn.onclick = () => { window.location.href = "clearance/clearance.html"; };
            return;
        }

        const line = lines[currentLine];
        terminal.innerHTML = lines.slice(0, currentLine).join("\n") + "\n" +
            line.substring(0, currentChar) +
            '<span class="cursor">|</span>';

        if (currentChar < line.length) {
            currentChar++;
            setTimeout(typeLine, typingSpeed);
        } else {
            currentLine++;
            currentChar = 0;
            setTimeout(typeLine, linePause);
        }
    }

    typeLine();
}

// Initialize
async function init() {
    
    const response = await fetch(`locales/${userLang}.json`);
    const data = await response.json();

    lines = [
        data.terminal.warning,
        data.terminal.errorMessage,
        data.terminal.foreignSignal,
        data.terminal.clearance
    ];

    startText = data.terminal.start; // localized button text

    startTyping();
}

if (userName) {
    window.location.href = "protocol/protocol.html";
} else {
    init(); // start your typewriter sequence
}
</script>
</body>
</html>
