<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area31</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="terminal"></div>

    <script>
        const lines = [
            "Warning: timeline corrupted",
            "The system has detected an error with message:",
            "‘for3ign s1gnal detected, unauthorised user is int3rcepting’.",
            "Clearance required"
        ];

        // Load typing sound
        const typeSound = new Audio('sounds/type.mp3'); // put a tiny type sound in /sounds/type.mp3
        typeSound.volume = 0.3; // optional, adjust volume
        
        const terminal = document.getElementById("terminal");
        const typingSpeed = 30; // ms per character
        const linePause = 800;  // pause after each line
        
        // Detect language (default to English)
        const userLang = navigator.language.startsWith("it") ? "it" : "en";

        // Typewriter counters
        let currentLine = 0;
        let currentChar = 0;

        async function loadStrings(lang) {
            const response = await fetch(`locales/${lang}.json`);
            const data = await response.json();
            return [
                data.terminal.warning,
                data.terminal.errorMessage,
                data.terminal.foreignSignal,
                data.terminal.clearance
            ];
        }

        async function startTyping() {
            const lines = await loadStrings(userLang);
    
            let currentLine = 0;
            let currentChar = 0;
    
            function typeLine() {
                if (currentLine >= lines.length) return;
    
                const line = lines[currentLine];
                terminal.innerHTML = lines.slice(0, currentLine).join("\n") + "\n" + line.substring(0, currentChar) + '<span class="cursor">|</span>';

                if (currentChar < line.length) {
                    typeSound.currentTime = 0; // reset sound so it can replay quickly
                    typeSound.play();
                    currentChar++;
                    setTimeout(typeLine, typingSpeed);
                } else {
                    currentLine++;
                    currentChar = 0;
                    setTimeout(typeLine, linePause);
                }
            }
    
            typeLine();
        }
    
        startTyping();
        
    </script>
</body>
</html>
