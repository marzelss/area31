<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area31 - Enter Name</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="terminal"></div>
<input type="password" id="nameField" placeholder="Password..." />
<button id="nameNext"></button>

<script>
const terminal = document.getElementById("terminal");
const nameField = document.getElementById("nameField");
const nameNextBtn = document.getElementById("nameNext");
const typingSpeed = 30;
const linePause = 800;

// Detect language
const userLang = navigator.language.startsWith("it") ? "it" : "en";

let lines = [];
let buttonText = "";

// Typewriter effect
function startTyping() {
    let currentLine = 0;
    let currentChar = 0;

    function typeLine() {
        if (currentLine >= lines.length) {
            // Show input and button
            terminal.innerHTML += "\n";
            nameField.style.display = "inline-block";
            nameField.focus();
            nameNextBtn.style.display = "inline-block";
            nameNextBtn.textContent = buttonText;

            // Disable button initially
            nameNextBtn.disabled = true;
            nameNextBtn.style.opacity = 0.5;
            
            // Enable button only if password >= 8 chars
            nameField.addEventListener("input", () => {
                if (nameField.value.length >= 8) {
                    nameNextBtn.disabled = false;
                    nameNextBtn.style.opacity = 1;
                } else {
                    nameNextBtn.disabled = true;
                    nameNextBtn.style.opacity = 0.5;
                }
            });
            
            nameNextBtn.onclick = () => {
                const password = nameField.value.trim();
                if(password.length >= 8) {
                    // Save password in sessionStorage for cross-checking
                    sessionStorage.setItem("userPassword", password);
                    window.location.href = "nextPage.html"; // replace with your next page
                }
            }
            return;
        }

        const line = lines[currentLine];
        terminal.innerHTML = lines.slice(0, currentLine).join("\n") + "\n" +
            line.substring(0, currentChar) +
            '<span class="cursor">|</span>';

        if (currentChar < line.length) {
            currentChar++;
            setTimeout(typeLine, typingSpeed);
        } else {
            currentLine++;
            currentChar = 0;
            setTimeout(typeLine, linePause);
        }
    }

    typeLine();
}

// Initialize
async function init() {
    const response = await fetch(`locales/${userLang}.json`);
    const data = await response.json();

    lines = [data.nameInput.prompt];
    buttonText = data.nameInput.button;

    startTyping();
}

init();
</script>

</body>
</html>
