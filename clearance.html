<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area31 - Clearance</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="terminal"></div>
<input type="text" id="nameField" style="display:none;" />
<button id="nameNext" style="display:none;"></button>

<script>
const terminal = document.getElementById("terminal");
const nameField = document.getElementById("nameField");
const nameNextBtn = document.getElementById("nameNext");
const typingSpeed = 30;
const linePause = 800;

// Detect language
const userLang = navigator.language.startsWith("it") ? "it" : "en";

let lines = [];
let promptText = "";
let buttonText = "";

// Typewriter effect
function startTyping() {
    let currentLine = 0;
    let currentChar = 0;

    function typeLine() {
        if (currentLine >= lines.length) {
            // Show input and button
            terminal.innerHTML += "\n";
            nameField.style.display = "inline-block";
            nameField.focus();
            nameNextBtn.style.display = "inline-block";
            nameNextBtn.textContent = buttonText;

            nameNextBtn.onclick = () => {
                const userName = nameField.value.trim();
                if(userName) {
                    // Save name in sessionStorage for future pages
                    sessionStorage.setItem("userName", userName);
                    window.location.href = "nextPage.html"; // replace with next page
                }
            }
            return;
        }

        const line = lines[currentLine];
        terminal.innerHTML = lines.slice(0, currentLine).join("\n") + "\n" +
            line.substring(0, currentChar) +
            '<span class="cursor">|</span>';

        if (currentChar < line.length) {
            currentChar++;
            setTimeout(typeLine, typingSpeed);
        } else {
            currentLine++;
            currentChar = 0;
            setTimeout(typeLine, linePause);
        }
    }

    typeLine();
}

// Initialize
async function init() {
    const response = await fetch(`locales/${userLang}.json`);
    const data = await response.json();

    lines = [data.nameInput.prompt];
    promptText = data.nameInput.prompt;
    buttonText = data.nameInput.button;

    startTyping();
}

init();
</script>

</body>
</html>
